<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0d1a00"/>
    </linearGradient>
  </defs>
  <!-- T letter -->
  <text x="256" y="340" font-family="Arial Black, sans-serif" font-weight="900"
    font-size="280" fill="#c8f135" text-anchor="middle">T</text>
  <!-- lime dot accent -->
  <circle cx="370" cy="175" r="28" fill="#c8f135" opacity="0.9"/>
</svg>
